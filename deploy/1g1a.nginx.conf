server {
    listen 80;
    server_name 1g1a.loose.bz;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 1g1a.loose.bz;

    access_log /home/codex/1g1a/web/logs/access.log;
    error_log /home/codex/1g1a/web/logs/error.log;

    ssl_certificate /etc/letsencrypt/live/1g1a.loose.bz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1g1a.loose.bz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
